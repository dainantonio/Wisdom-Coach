<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Coach</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Nunito for a rounded, kid-friendly look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            font-family: 'Nunito', sans-serif;
        }
        
        /* Soothing, magical animated gradient background */
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef08a 100%);
            background-attachment: fixed;
        }

        /* Glassmorphism effects */
        .glass-header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
        }
        .glass-footer {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Message Pop-in Animation */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message-animate {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Bouncing dots for typing indicator */
        .typing-dot {
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Friendly scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- Header (Glassmorphism) -->
    <header class="glass-header p-4 shadow-sm flex items-center justify-center gap-3 z-10 shrink-0 relative">
        <div class="bg-yellow-400 text-white p-2 rounded-full shadow-md">
            <!-- Friendly Sun Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="text-yellow-100">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 2v2"></path><path d="M12 20v2"></path>
                <path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path>
                <path d="M2 12h2"></path><path d="M20 12h2"></path>
                <path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-700 tracking-tight">Wisdom Coach</h1>
    </header>

    <!-- Chat Window -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-6 w-full max-w-4xl mx-auto">
        <!-- Initial Welcome Message from the Coach -->
        <div class="flex justify-start w-full message-animate">
            <div class="flex gap-3 max-w-[90%] sm:max-w-[75%]">
                <!-- Coach Avatar -->
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-yellow-300 to-yellow-500 flex items-center justify-center shadow-md shrink-0 border-2 border-white">
                    <span class="text-lg">☀️</span>
                </div>
                <!-- Bubble -->
                <div class="bg-white px-5 py-4 rounded-3xl rounded-tl-none shadow-[0_4px_14px_rgba(0,0,0,0.05)] border border-gray-100">
                    <p class="text-[1.1rem] leading-relaxed text-gray-700">Hi there! 👋 I'm your Wisdom Coach. I'm here to listen and help.</p>
                    <p class="text-[1.1rem] leading-relaxed text-gray-700 mt-2 font-semibold">What happened today?</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area (Glassmorphism) -->
    <footer class="glass-footer p-4 sm:p-6 z-10 shrink-0">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3 relative">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Type what happened..." 
                autocomplete="off"
                class="flex-1 border-2 border-transparent bg-white/90 rounded-full pl-6 pr-16 py-4 focus:outline-none focus:border-blue-300 focus:bg-white text-[1.1rem] transition-all shadow-[0_2px_15px_rgba(0,0,0,0.08)] placeholder-gray-400"
            >
            <button 
                type="submit" 
                class="absolute right-2 top-2 bottom-2 aspect-square bg-gradient-to-r from-blue-400 to-blue-500 hover:from-blue-500 hover:to-blue-600 text-white rounded-full flex items-center justify-center shadow-md transition-transform transform hover:scale-105 active:scale-95"
                aria-label="Send Message"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="ml-1">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        // Full-Stack Magic: Simple Markdown Parser for the AI's response
        // Converts **bold**, *italic*, and \n line breaks into HTML
        function parseMarkdown(text) {
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-gray-800">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em class="italic text-gray-800">$1</em>')
                .replace(/\n/g, '<br>');
            return html;
        }

        // Helper function to create and append message bubbles
        function appendMessage(message, sender) {
            const messageContainer = document.createElement('div');
            messageContainer.className = `flex w-full message-animate ${sender === 'user' ? 'justify-end' : 'justify-start'}`;

            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-3 max-w-[90%] sm:max-w-[75%] ${sender === 'user' ? 'flex-row-reverse' : ''}`;

            // Add Avatar for Coach
            if (sender === 'coach') {
                const avatar = document.createElement('div');
                avatar.className = 'w-10 h-10 rounded-full bg-gradient-to-tr from-yellow-300 to-yellow-500 flex items-center justify-center shadow-md shrink-0 border-2 border-white mt-1';
                avatar.innerHTML = '<span class="text-lg">☀️</span>';
                wrapper.appendChild(avatar);
            }

            const bubble = document.createElement('div');
            
            if (sender === 'user') {
                bubble.className = 'bg-gradient-to-br from-blue-500 to-blue-600 text-white px-5 py-4 rounded-3xl rounded-tr-none shadow-[0_4px_14px_rgba(59,130,246,0.3)] border border-blue-400';
                bubble.innerHTML = `<p class="text-[1.1rem] leading-relaxed">${message}</p>`; // User input is plain text
            } else {
                bubble.className = 'bg-white text-gray-700 px-5 py-4 rounded-3xl rounded-tl-none shadow-[0_4px_14px_rgba(0,0,0,0.05)] border border-gray-100';
                bubble.innerHTML = `<p class="text-[1.1rem] leading-relaxed">${parseMarkdown(message)}</p>`; // Parse AI markdown
            }
            
            wrapper.appendChild(bubble);
            messageContainer.appendChild(wrapper);
            chatWindow.appendChild(messageContainer);

            scrollToBottom();
        }

        function showTypingIndicator() {
            const container = document.createElement('div');
            container.id = 'typing-indicator';
            container.className = 'flex w-full justify-start message-animate';
            
            container.innerHTML = `
                <div class="flex gap-3 max-w-[90%] sm:max-w-[75%]">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-yellow-300 to-yellow-500 flex items-center justify-center shadow-md shrink-0 border-2 border-white mt-1">
                        <span class="text-lg">☀️</span>
                    </div>
                    <div class="bg-white px-5 py-5 rounded-3xl rounded-tl-none shadow-sm border border-gray-100 flex items-center gap-1.5 h-[58px]">
                        <div class="w-2.5 h-2.5 bg-yellow-400 rounded-full typing-dot"></div>
                        <div class="w-2.5 h-2.5 bg-yellow-400 rounded-full typing-dot"></div>
                        <div class="w-2.5 h-2.5 bg-yellow-400 rounded-full typing-dot"></div>
                    </div>
                </div>
            `;
            chatWindow.appendChild(container);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function scrollToBottom() {
            chatWindow.scrollTo({
                top: chatWindow.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Main fetch function
        function fetchAdvice(userMessage) {
            appendMessage(userMessage, 'user');
            showTypingIndicator();

            fetch('/.netlify/functions/getAdvice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMessage })
            })
            .then(response => {
                if (!response.ok) throw new Error('Server returned an error');
                return response.json();
            })
            .then(data => {
                removeTypingIndicator();
                if (data.advice) {
                    appendMessage(data.advice, 'coach');
                } else {
                    appendMessage("Oops! I got a little mixed up. Can we try again?", 'coach');
                }
            })
            .catch(error => {
                console.error('Error fetching advice:', error);
                removeTypingIndicator();
                appendMessage("Oops! I am having trouble connecting to my thoughts right now. Please try again later.", 'coach');
            });
        }

        chatForm.addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const message = userInput.value.trim();
            if (message !== '') {
                fetchAdvice(message);
                userInput.value = '';
                userInput.focus();
            }
        });
    </script>
</body>
</html>
